<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Matrix Chat Engine</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0b0b0d;
            color: #e1e1e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin: 0 0 5px 0;
            color: #00ffcc;
            font-size: 24px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .subtitle {
            font-size: 12px;
            color: #666;
            margin-bottom: 20px;
        }

        .main-frame {
            width: 100%;
            max-width: 600px;
            background-color: #121215;
            border: 2px solid #222226;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            box-sizing: border-box;
        }

        /* Access Portal Layer */
        #loginPortal {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }

        input {
            background-color: #09090b;
            border: 1px solid #2c2c35;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: #00ffcc;
        }

        .action-btn {
            background-color: #00ffcc;
            color: #0c0c0e;
            border: none;
            padding: 14px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background-color: #00d4b0;
        }

        /* Interface Interface Chat Room Layer */
        #chatInterface {
            display: none;
            flex-direction: column;
            height: 500px;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222226;
            padding-bottom: 12px;
            margin-bottom: 15px;
        }

        .room-title {
            font-size: 16px;
            font-weight: bold;
            color: #ff0055;
        }

        #messageBox {
            flex: 1;
            background-color: #09090b;
            border: 1px solid #1c1c22;
            border-radius: 6px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }

        .msg-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-remote {
            background-color: #1c1c24;
            color: #e1e1e6;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg-local {
            background-color: #00ffcc;
            color: #0c0c0e;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            font-weight: 500;
        }

        .msg-meta {
            font-size: 10px;
            margin-bottom: 3px;
            color: #888;
            display: block;
        }

        .msg-local .msg-meta {
            color: #333;
        }

        .input-bar {
            display: flex;
            gap: 10px;
        }

        #textInput {
            flex: 1;
        }
    </style>
</head>
<body>

    <h1>Local Matrix Chat Engine</h1>
    <div class="subtitle">Open multiple tabs of this file to chat locally instantly</div>

    <div class="main-frame">
        <div id="loginPortal">
            <div class="form-group">
                <label>Choose Screen Name</label>
                <input type="text" id="usernameInput" placeholder="e.g., GhostRider" maxlength="15">
            </div>
            <div class="form-group">
                <label>Enter Chat Room Access Code</label>
                <input type="text" id="roomCodeInput" placeholder="e.g., 9942" maxlength="10">
            </div>
            <button class="action-btn" onclick="connectToChatRoom()">Initialize Access Terminal</button>
        </div>

        <div id="chatInterface">
            <div class="room-header">
                <div>Room Code: <span class="room-title" id="activeRoomLabel">0000</span></div>
                <div style="font-size: 12px; color: #aaa;">User: <b id="activeUserLabel" style="color:#00ffcc;">-</b></div>
            </div>

            <div id="messageBox"></div>

            <div class="input-bar">
                <input type="text" id="textInput" placeholder="Type a secure message..." onkeydown="if(event.key === 'Enter') dispatchChatMessage()">
                <button class="action-btn" onclick="dispatchChatMessage()" style="padding: 0 20px;">Send</button>
            </div>
        </div>
    </div>

    <script>
        var currentUsername = "";
        var currentRoomCode = "";
        var lastPolledMessageCount = 0;

        function connectToChatRoom() {
            var userField = document.getElementById("usernameInput").value.trim();
            var codeField = document.getElementById("roomCodeInput").value.trim();

            if (!userField || !codeField) {
                alert("Please complete both form entry parameters!");
                return;
            }

            currentUsername = userField;
            currentRoomCode = codeField.toUpperCase();

            // Screen Interface swap modifications
            document.getElementById("loginPortal").style.display = "none";
            document.getElementById("chatInterface").style.display = "flex";
            
            document.getElementById("activeRoomLabel").innerText = currentRoomCode;
            document.getElementById("activeUserLabel").innerText = currentUsername;

            // Load historical room messages data arrays if existing
            renderMessageDatabase();

            // Set up an automated check interval to scan for inbound text elements every 400ms
            setInterval(renderMessageDatabase, 400);
        }

        function getRoomStorageKey() {
            return "LOCAL_MATRIX_CHAT_ROOM_" + currentRoomCode;
        }

        function renderMessageDatabase() {
            var storageKey = getRoomStorageKey();
            var rawData = localStorage.getItem(storageKey);
            var messagesList = [];

            if (rawData) {
                messagesList = JSON.parse(rawData);
            }

            // Optimize window element rendering loops if state balance arrays match exactly
            if (messagesList.length === lastPolledMessageCount) return;
            lastPolledMessageCount = messagesList.length;

            var container = document.getElementById("messageBox");
            container.innerHTML = "";

            for (var i = 0; i < messagesList.length; i++) {
                var item = messagesList[i];
                var isOwnMessage = (item.sender === currentUsername);

                var bubble = document.createElement("div");
                bubble.className = "msg-bubble " + (isOwnMessage ? "msg-local" : "msg-remote");

                var metaElement = document.createElement("span");
                metaElement.className = "msg-meta";
                metaElement.innerText = item.sender + " • " + item.time;

                var textNode = document.createTextNode(item.text);

                bubble.appendChild(metaElement);
                bubble.appendChild(textNode);
                container.appendChild(bubble);
            }

            // Auto-scroll chat box down to the most recent message
            container.scrollTop = container.scrollHeight;
        }

        function dispatchChatMessage() {
            var inputElement = document.getElementById("textInput");
            var textToSend = inputElement.value.trim();
            if (!textToSend) return;

            var storageKey = getRoomStorageKey();
            var rawData = localStorage.getItem(storageKey);
            var messagesList = [];

            if (rawData) {
                messagesList = JSON.parse(rawData);
            }

            var timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            // Package message object payload structures
            var newMessageObj = {
                sender: currentUsername,
                text: textToSend,
                time: timestamp
            };

            messagesList.push(newMessageObj);

            // Write back to the local device storage vault
            localStorage.setItem(storageKey, JSON.stringify(messagesList));

            // Clear text entry bar
            inputElement.value = "";
            renderMessageDatabase();
        }
    </script>
</body>
</html>
