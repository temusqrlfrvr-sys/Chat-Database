<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Web Call</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background-color: #f4f7f6; 
            margin: 0;
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: inline-block; 
            max-width: 400px; 
            width: 100%; 
            box-sizing: border-box;
        }
        input { 
            width: 80%; 
            padding: 12px; 
            margin: 15px 0; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            text-align: center; 
            font-size: 16px;
        }
        button { 
            background-color: #2ec4b6; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            font-size: 16px; 
            border-radius: 5px; 
            cursor: pointer; 
            margin: 5px; 
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.8;
        }
        button.hangup { 
            background-color: #e71d36; 
        }
        #status { 
            font-weight: bold; 
            color: #ff9f1c; 
            margin: 20px 0 10px 0; 
            font-size: 15px;
        }
        hr {
            border: 0;
            height: 1px;
            background: #eee;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Global Web Call</h2>
        
        <p>Your Calling ID: <br><strong id="my-id" style="font-size: 28px; color: #011627; letter-spacing: 2px;">Generating...</strong></p>
        
        <hr>

        <h3>Make a Call</h3>
        <input type="text" id="friend-id-input" placeholder="Enter 4-digit Calling ID" inputmode="numeric" pattern="[0-9]*">
        <br>
        <button onclick="startCall()">📞 Call Friend</button>
        <button class="hangup" onclick="hangUp()">❌ End Call</button>

        <div id="status">Status: Connecting to network...</div>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        let peer = null;
        let localStream = null;
        let currentCall = null;

        // 1. Safe ID Generation Function
        function generateShortId() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        // 2. Safe Peer Initialization Wrapper
        function initializePeer() {
            const myShortId = generateShortId();
            
            // Destroy any leftover instance safely before building a new one
            if (peer) {
                try { peer.destroy(); } catch(e) {}
            }

            peer = new Peer(myShortId); 

            // Handle successful connection assignment
            peer.on('open', function(id) {
                document.getElementById('my-id').innerText = id;
                document.getElementById('status').innerText = "Status: Ready to call or receive!";
            });

            // Handle incoming audio calls
            peer.on('call', function(incomingCall) {
                document.getElementById('status').innerText = "Status: Incoming call! Connecting...";
                
                navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                    .then(function(stream) {
                        localStream = stream;
                        incomingCall.answer(stream); 
                        currentCall = incomingCall;
                        setupCallHandlers(incomingCall);
                    })
                    .catch(function(err) {
                        console.error("Mic access error:", err);
                        alert("Microphone required to answer calls. Please check site permissions!");
                        document.getElementById('status').innerText = "Status: Mic permission error.";
                    });
            });

            // Global Error Management to stop app from breaking
            peer.on('error', function(err) {
                console.warn("PeerJS Error Caught safely:", err.type);
                
                // If the 4-digit ID is already in use by someone else, auto-retry with a new code
                if (err.type === 'unavailable-id') {
                    document.getElementById('status').innerText = "Status: Code taken, assigning new ID...";
                    setTimeout(initializePeer, 500); 
                } 
                // Handle when dialing a code that doesn't exist on the server
                else if (err.type === 'peer-not-found') {
                    alert("The ID you called does not exist. Check the number and try again!");
                    document.getElementById('status').innerText = "Status: Call failed. Target not found.";
                    stopMic();
                } 
                else {
                    document.getElementById('status').innerText = "Status: Error encountered. Reconnecting...";
                    stopMic();
                }
            });
        }

        // 3. Handle outgoing dials safely
        function startCall() {
            const friendId = document.getElementById('friend-id-input').value.trim();
            if (!friendId) return alert("Please enter a 4-digit Calling ID first!");

            document.getElementById('status').innerText = "Status: Requesting mic access...";

            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                .then(function(stream) {
                    localStream = stream;
                    document.getElementById('status').innerText = "Status: Dialing...";
                    
                    const call = peer.call(friendId, stream); 
                    currentCall = call;
                    setupCallHandlers(call);
                })
                .catch(function(err) {
                    console.error("Mic access error:", err);
                    alert("Microphone required to make calls. Check your browser permissions!");
                    document.getElementById('status').innerText = "Status: Mic permission error.";
                });
        }

        // 4. Bind listeners to active voice streams
        function setupCallHandlers(call) {
            call.on('stream', function(remoteStream) {
                document.getElementById('status').innerText = "Status: 🟢 Connected! Speaking...";
                const remoteAudio = document.getElementById('remote-audio');
                
                // Keep audio fallback secure for safari/ios rendering environments
                if ('srcObject' in remoteAudio) {
                    remoteAudio.srcObject = remoteStream;
                } else {
                    remoteAudio.src = window.URL.createObjectURL(remoteStream);
                }
            });

            call.on('close', function() {
                document.getElementById('status').innerText = "Status: Call ended.";
                stopMic();
            });
        }

        // 5. Clean termination commands
        function hangUp() {
            if (currentCall) {
                try { currentCall.close(); } catch(e){}
            }
            document.getElementById('status').innerText = "Status: Call hung up.";
            stopMic();
        }

        function stopMic() {
            if (localStream) {
                try {
                    localStream.getTracks().forEach(track => track.stop());
                } catch(e) {}
                localStream = null;
            }
        }

        // Launch app initialization immediately
        initializePeer();
    </script>
</body>
</html>
